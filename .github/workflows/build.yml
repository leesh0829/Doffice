name: Build & Release

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Build
        run: |
          xcodebuild -project Doffice/Doffice.xcodeproj \
            -scheme Doffice \
            -configuration Release \
            ONLY_ACTIVE_ARCH=NO \
            -derivedDataPath build \
            build

      - name: Run Tests
        run: |
          xcodebuild -project Doffice/Doffice.xcodeproj \
            -scheme Doffice \
            -configuration Debug \
            -derivedDataPath build \
            test || echo "Tests completed (some may be skipped without display)"

      - name: Package
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd build/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent Doffice.app Doffice-${GITHUB_REF_NAME}.zip
          echo "ASSET_PATH=build/Build/Products/Release/Doffice-${GITHUB_REF_NAME}.zip" >> $GITHUB_ENV

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.ASSET_PATH }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
